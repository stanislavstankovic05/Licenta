CONFIG_PRINTK=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_NEWLIB_LIBC=y
CONFIG_THREAD_CUSTOM_DATA=y

# Required by strict_stack_ok() -> k_thread_foreach() (cross-app stack check)
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_STACK_INFO=y

# Disable hardware MPU — we provide software isolation via VMMU
CONFIG_MPU=n

# Stack overflow detection
# CONFIG_STACK_SENTINEL: Zephyr writes a canary at the bottom of every
# thread stack and verifies it on each context switch. Catches overflows
# that slip through between vmmu_stack_check injection points (e.g. a
# single function with a massive local array that never calls anything).
# Acts as a second layer behind the VMMUPass SP-check.
CONFIG_STACK_SENTINEL=y
